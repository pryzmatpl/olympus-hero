services:
  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "9001:80"
      - "9443:443"
    volumes:
      - pryzmat_certbot_certs:/etc/letsencrypt:ro
      - ./public:/app/public
      - ./src:/app/src
    depends_on:
      - server

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    env_file:
      # Variables such as ELEVENLABS_API_KEY / XI_API_KEY load from this file once at container create time.
      # After editing .env, recreate the running server (`docker compose up -d --force-recreate server`) or the process keeps old env.
      - .env
    environment:
      - NODE_ENV=production
      - PORT=9002
      - JWT_SECRET=dev_jwt_secret
      # Prefer MONGO_URI from .env (required if Mongo uses auth). Never publish Mongo to the host without a firewall + auth.
      - MONGO_URI=${MONGO_URI:-mongodb://mongodb:27017/olympus-hero}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./:/app
      - /app/node_modules
      # Persist only generated hero images; keep marketing files at storage/*.webp from the image/deploy tree.
      - /storage/olympus-heros/images:/app/storage/images
    ports:
      - "9002:9002"
    command: npm run server:dev
    depends_on:
      - mongodb

  # MongoDB is NOT published to the host. It is only reachable on the Docker network (e.g. hostname "mongodb" for the server service). This blocks internet-wide scanning and opportunistic ransom/wipe attacks. To open a local admin shell: docker compose exec mongodb mongosh "mongodb://127.0.0.1:27017/olympus-hero"
  mongodb:
    image: mongo:6.0
    volumes:
      - mongodb-data:/data/db
    restart: always
    environment:
      - MONGO_INITDB_DATABASE=olympus-hero

volumes:
  hero-data: 
  mongodb-data: 
  pryzmat_certbot_certs:
    external: true