services:
  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "9001:80"
      - "9443:443"
    volumes:
      - pryzmat_certbot_certs:/etc/letsencrypt:ro
      - ./public:/app/public
      - ./src:/app/src
    depends_on:
      - server

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=9002
      - JWT_SECRET=dev_jwt_secret
      - MONGO_URI=mongodb://mongodb:27017/olympus-hero
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./:/app
      - /app/node_modules
      # Persist only generated hero images; keep marketing files at storage/*.webp from the image/deploy tree.
      - /storage/olympus-heros/images:/app/storage/images
    ports:
      - "9002:9002"
    command: npm run server:dev
    depends_on:
      - mongodb

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    restart: always
    environment:
      - MONGO_INITDB_DATABASE=olympus-hero

volumes:
  hero-data: 
  mongodb-data: 
  pryzmat_certbot_certs:
    external: true